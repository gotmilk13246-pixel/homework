<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>소윤성 검수 퀴즈</title>
<style>
:root{color-scheme:light}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:#f5f5f7;color:#1a1a1a;line-height:1.5}
.gate{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:24px}
.gate h1{margin:0 0 16px;font-size:20px}
.gate input{font-size:18px;padding:12px 16px;border:2px solid #ddd;border-radius:10px;width:100%;max-width:280px;text-align:center}
.gate button{margin-top:12px;padding:12px 28px;font-size:16px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-weight:600}
.gate .err{color:#d33;font-size:13px;margin-top:8px;min-height:18px}
.hide{display:none!important}
.wrap{max-width:720px;margin:0 auto;padding:16px 14px 80px}
.head{background:#1a1a1a;color:#fff;padding:18px 16px;border-radius:14px;margin-bottom:14px}
.head h1{margin:0 0 4px;font-size:18px;font-weight:700}
.head p{margin:0;font-size:13px;opacity:.85}
.progress{position:sticky;top:0;background:rgba(245,245,247,.95);backdrop-filter:blur(8px);padding:10px 0;margin:-16px -14px 12px;border-bottom:1px solid #e5e5ea;z-index:10}
.progress-inner{max-width:720px;margin:0 auto;padding:0 14px;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#666}
.progress-bar{height:4px;background:#e5e5ea;border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;background:#1a1a1a;width:0;transition:width .25s}
.q{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.qnum{font-size:12px;font-weight:700;color:#888;letter-spacing:.5px;margin-bottom:6px}
.qtype{display:inline-block;background:#eef;color:#446;font-size:11px;padding:2px 8px;border-radius:6px;margin-left:6px;font-weight:600}
.qprompt{font-size:15px;font-weight:600;margin-bottom:6px;line-height:1.45}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{padding:12px 14px;background:#f5f5f7;border:2px solid transparent;border-radius:10px;font-size:14px;line-height:1.45;cursor:pointer;transition:all .15s;text-align:left;color:#1a1a1a}
.opt:active{transform:scale(.98)}
.opt.correct{background:#d4f4dd;border-color:#2d8b3e;color:#1a3a22}
.opt.wrong{background:#fde0e0;border-color:#c33;color:#5a1818}
.opt.disabled{cursor:default}
.fb{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:13px;line-height:1.5;display:none}
.fb.show{display:block}
.fb.ok{background:#e8f7ec;color:#1a3a22}
.fb.no{background:#fdecec;color:#5a1818}
.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e5ea;padding:12px 14px env(safe-area-inset-bottom);display:flex;gap:8px;justify-content:space-between;align-items:center}
.bottom .score{font-size:14px;font-weight:600}
.bottom button{padding:10px 18px;font-size:14px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-weight:600}
.result{background:#1a1a1a;color:#fff;padding:24px;border-radius:14px;text-align:center;margin-top:14px;display:none}
.result.show{display:block}
.result h2{margin:0 0 8px;font-size:24px}
.result p{margin:4px 0;font-size:14px;opacity:.85}
.result .big{font-size:42px;font-weight:800;margin:8px 0}
.reset{margin-top:14px;padding:10px 20px;background:transparent;color:#fff;border:1px solid #fff;border-radius:8px;font-size:13px}
</style>
</head>
<body>

<div class="wrap" id="main">
  <div class="head">
    <h1>소윤성 검수 퀴즈</h1>
    <p>역접·반전 신호 검수 · 20문항</p>
  </div>

  <div class="progress">
    <div class="progress-inner">
      <span id="pgText">0 / 20</span>
      <span id="scoreText">정답 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="pgFill"></div></div>
  </div>

  <div id="quiz"></div>

  <div class="result" id="result">
    <h2>완료!</h2>
    <div class="big" id="finalScore">0 / 20</div>
    <p id="finalMsg"></p>
    <button type="button" class="reset" id="resetBtn">다시 풀기</button>
  </div>
</div>

<div class="bottom" id="bottom">
  <div class="score" id="bScore">0 / 20</div>
  <button type="button" onclick="scrollNext()" id="nextBtn">다음 문항 ↓</button>
</div>

<script>


const QUIZ = [
  {n:1, type:'빈칸·역접', prompt:'1번 빈칸 — 정답 ②(a tinkerer working with whatever materials history has left behind)의 역접 신호는?',
   opts:[
    '"Popular accounts of evolution often present natural selection as a force"',
    '"The image is intuitive but misleading"',
    '"Many traits we observe today are not adaptations crafted by selection"',
    '"A more honest portrait of evolution presents it not as a craftsman"'
   ], ans:1},

  {n:2, type:'빈칸·반전', prompt:'2번 빈칸 — 정답 ③(the prize earned by effort, not the fuel that produces it)의 반전 신호는?',
   opts:[
    '"Self-help culture insists that confidence is the engine of achievement"',
    '"Yet the research record points in an awkward direction"',
    '"those who began a difficult task doubting their performance"',
    '"The students most likely to underprepare ... feel sure they will pass"'
   ], ans:1},

  {n:3, type:'빈칸·역접', prompt:'3번 빈칸 — 정답 ②(which mix of practices delivers a given amount of food at the lowest environmental cost)의 역접 신호는?',
   opts:[
    '"Critics of modern agriculture often picture small, traditional farms as ecologically harmless"',
    '"The contrast is rhetorically convenient but empirically thin"',
    '"the genuine harms of industrial agriculture — runoff, monoculture, animal welfare"',
    '"Per kilogram of food produced, many traditional systems use more land"'
   ], ans:1},

  {n:4, type:'빈칸·반전', prompt:'4번 빈칸 — 정답 ②(the cumulative residue of human choices reread as nature\'s own design)의 반전 신호는?',
   opts:[
    '"It is widely believed that great cities arise where rivers meet"',
    '"Historians who look closely, however, repeatedly find the arrow pointing the other way"',
    '"London\'s harbor mattered because London grew"',
    '"hardened by investment and habit until it looks like a feature of the land itself"'
   ], ans:1},

  {n:5, type:'빈칸·역접', prompt:'5번 빈칸 — 정답 ②(a precondition for the collective self-correction)의 역접 신호는?',
   opts:[
    '"A common defense of free speech treats it as a private right"',
    '"This framing captures something important but leaves something equally important out"',
    '"Even views that turn out to be wrong serve as tests of received opinion"',
    '"the comfort of consensus is bought at the price of a society"'
   ], ans:1},

  {n:6, type:'빈칸·반전', prompt:'6번 빈칸 — 정답 ③(the figure history happened to remember among several who reached the same place)의 반전 신호는?',
   opts:[
    '"A familiar story about technological progress runs as follows"',
    '"The careful study of innovation tells a different story"',
    '"Far from depending on a unique genius"',
    '위 B와 C 모두'
   ], ans:3},

  {n:7, type:'함축·반전', prompt:'7번 "the cure was the disease" — 이 비유의 직접 재진술 문장은?',
   opts:[
    '"several school districts adopted zero tolerance policies in the hope of restoring order"',
    '"Suspensions soared, but mostly for minor incidents"',
    '"By tightening discipline indiscriminately, schools manufactured the disengagement they had set out to suppress"',
    '"Backers argued that uniform punishment would deter bad behavior"'
   ], ans:2},

  {n:8, type:'함축·반전', prompt:'8번 "the wind that puts out the candle and fans the bonfire" — 이 비유의 직접 재진술은?',
   opts:[
    '"Adversity is often spoken of as if it were a single force with a single effect"',
    '"The same job loss that pushes one person into withdrawal pushes another into a more deliberate life"',
    '"What it does to a life depends on the life it meets"',
    '"outcomes diverge less by the size of the blow than by the resources, relationships, and habits"'
   ], ans:2},

  {n:9, type:'주제·반전', prompt:'9번 — 정답 ②(능동적 추론 과정으로서의 시각)의 반전 신호 + 결정 단서는?',
   opts:[
    '"The intuitive picture of vision is that the eye delivers a faithful image" — 통념',
    '"Decades of work in visual neuroscience have made this picture untenable" + "Vision, on this view, is less a window than a permanent act of inference" — untenable 신호 + 마지막 재진술',
    '"When this hypothesis is wrong, we encounter optical illusions" — illusion 사례',
    '"The retina sends only fragmentary, low-resolution signals" — 망막 묘사'
   ], ans:1},

  {n:10, type:'요지·반전', prompt:'10번 — 정답 ③(자유와 학습·훈련이 함께)의 반전 신호 + 결정 단서는?',
   opts:[
    '"Many discussions of childhood creativity treat it as a kind of natural resource"',
    '"There is something to this caution, but on its own it is incomplete and even misleading" + "Real creativity grows where freedom and discipline meet"',
    '"The advice that follows is mostly negative: do not over-direct"',
    '"Romanticizing untutored expression flatters adults who do not wish to teach"'
   ], ans:1},

  {n:11, type:'주장·역접', prompt:'11번 — 정답 ③(청중의 관심을 이해하는 데서 시작)의 역접 신호 + 결정 단서는?',
   opts:[
    '"It is tempting to think that the way to fight misinformation is to flood the public with corrections"',
    '"Yet study after study has found that simply repeating a false claim ... can deepen its hold on memory" + "It is a matter of understanding why a particular claim found a foothold"',
    '"Effective responses look different"',
    '"more fact-checks, more rebuttals, more authoritative voices"'
   ], ans:1},

  {n:12, type:'제목·반전', prompt:'12번 — 정답 ③(Travel Educates Only When Familiar Categories Fail)의 반전 신호 + 결정 단서는?',
   opts:[
    '"Travel is regularly described as broadening the mind"',
    '"The reality is more complicated" + "It is not movement across borders that educates a traveler but the willingness to allow one\'s own categories to fail"',
    '"Tourists who pass briefly through a country, photograph its monuments"',
    '"a passport accumulates stamps"'
   ], ans:1},

  {n:13, type:'순서·역접', prompt:'13번 순서 (A)-(C)-(B) — (B)가 마지막에 오는 결정 단서는?',
   opts:[
    '(B)의 "Recent reforms"가 시간상 가장 늦은 시점이라 마지막',
    '(B)는 가사노동의 정의를 처음 제시',
    '(B)의 "monetary terms"가 (A)의 "paper trail"을 받음',
    '(B)는 가사노동 제외의 이유를 설명'
   ], ans:0},

  {n:14, type:'순서·역접', prompt:'14번 순서 (B)-(A)-(C) — (B)가 첫 자리에 오는 결정 단서는?',
   opts:[
    '(B)의 "However"가 주어진 글의 통념을 직접 반박',
    '(A)의 "What does seem to deter"가 (B)의 부정 결과를 받음',
    '(C)의 "The implication for policy"가 결론',
    '위 모두 정답'
   ], ans:3},

  {n:15, type:'순서·역접', prompt:'15번 순서 (A)-(C)-(B) vs (A)-(B)-(C) 함정 — (A)-(C)-(B)가 정답인 결정 근거는?',
   opts:[
    '(C)의 "Modern cardiac rehabilitation reflects that reversal"가 가장 늦은 시점',
    '(B)의 "What had seemed like obvious caution turned out to be active harm"이 (A)의 시험 결과를 일반화한 결론',
    '(A)→(C)→(B) 흐름: 시험 결과 → 현재 재활 → 결론적 일반화',
    'A·B 모두 정답이며 (B)가 결론적 일반화이므로 (A)-(C)-(B)가 자연스러움'
   ], ans:3},

  {n:16, type:'순서·역접', prompt:'16번 순서 (A)-(C)-(B) — (A)의 "Yet"이 받는 대상은?',
   opts:[
    '주어진 글의 "people born with extraordinary brains" 통념',
    '(B)의 "romantic view"',
    '(C)의 "techniques"',
    '(A)의 "memory tasks"'
   ], ans:0},

  {n:17, type:'어휘·인과흐름', prompt:'17번 어휘 — ⑤(confirmed)이 부적절한 이유의 인과 흐름은?',
   opts:[
    '보행자 친화 설계 → 매출 증가 → 유럽 도시 확산 → 차=상업 가정 CONFIRMED',
    '보행자 친화 설계 → 매출 증가 → 유럽 도시 확산 → 차=상업 가정 OVERTURNED/REFUTED',
    '"The opposite happened"이 confirmed의 근거',
    'confirmed가 본문 흐름과 일치함'
   ], ans:1},

  {n:18, type:'어휘·역접흐름', prompt:'18번 어휘 — ④(expanding)이 부적절한 이유의 인과 흐름은?',
   opts:[
    '내성 증가 → 신약 개발 느려짐 → 효과적 선택지의 공급 EXPANDING',
    '내성 증가 → 신약 개발 느려짐 → 효과적 선택지의 공급 SHRINKING/CONTRACTING',
    '"the need for them grows"가 expanding을 뒷받침',
    'expanding은 본문의 긍정적 결말과 일치'
   ], ans:1},

  {n:19, type:'삽입·역접', prompt:'19번 — 주어진 문장 "However, a closer look at the data suggests that this comforting picture rests on a selective reading of the evidence"가 ③에 들어가는 단서는?',
   opts:[
    '② 이전 빈곤 감소의 긍정 서사 → ③ 자리에서 However 반전 → ③ 이후 "Most of the global decline reflects rapid growth in a single country, China" 구체적 비판',
    '④ 이후의 "Once the threshold is raised even modestly"가 직접 받음',
    '⑤의 "The achievement is real"이 주어진 문장과 동일',
    '①에 들어가야 통념이 처음부터 부정됨'
   ], ans:0},

  {n:20, type:'삽입·반전', prompt:'20번 — 주어진 문장 "But the comparison breaks down at exactly the point that matters most"가 ③에 들어가는 단서는?',
   opts:[
    '② 이전 두뇌-컴퓨터 유추의 효용 → ③ 자리에서 But 반전 → ③ 이후 "A computer\'s hardware and software are clearly distinct" + ④ "The brain has no such separation" 구체적 결정적 차이',
    '④ 이후의 "The brain has no such separation"이 직접 받음',
    '⑤의 "Treating the brain as if its software"가 주어진 문장과 동일',
    '①에 들어가야 유추가 처음부터 부정됨'
   ], ans:0}
];

// resetBtn 리스너
window.addEventListener('DOMContentLoaded',function(){
  // 잠금 체크
  try {
    const saved = localStorage.getItem('sys_check_v1');
    if(saved){
      const data = JSON.parse(saved);
      if(data && data.done){
        showLocked(data);
        return;
      }
    }
  } catch(e) {}
  
  const _resetBtn=document.getElementById('resetBtn');
  if(_resetBtn){
    ['click','touchend'].forEach(ev=>_resetBtn.addEventListener(ev,function(e){
      if(ev==='touchend')e.preventDefault();
      resetAll();
    },{passive:false}));
  }
  render();
});

let answered=0, score=0;

function render(){
  const root=document.getElementById('quiz');
  root.innerHTML='';
  QUIZ.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='q';
    div.id='q'+i;
    div.innerHTML=`
      <div class="qnum">Q${q.n} <span class="qtype">${q.type}</span></div>
      <div class="qprompt">${q.prompt}</div>
      <div class="opts">
        ${q.opts.map((o,j)=>`<button type="button" class="opt" data-i="${i}" data-j="${j}">${String.fromCharCode(65+j)}. ${o}</button>`).join('')}
      </div>
      <div class="fb" id="fb${i}"></div>
    `;
    root.appendChild(div);
  });
  root.querySelectorAll('.opt').forEach(b=>{
    ['click','touchend'].forEach(ev=>b.addEventListener(ev,function(e){
      if(ev==='touchend')e.preventDefault();
      pick.call(b,{target:b});
    },{passive:false}));
  });
  updateProgress();
}

function pick(e){
  const tgt = e.target;
  const i=+tgt.dataset.i, j=+tgt.dataset.j;
  const q=QUIZ[i];
  const block=document.getElementById('q'+i);
  if(block.dataset.done)return;
  block.dataset.done='1';
  const opts=block.querySelectorAll('.opt');
  opts.forEach((o,k)=>{
    o.classList.add('disabled');
    if(k===q.ans)o.classList.add('correct');
    if(k===j&&j!==q.ans)o.classList.add('wrong');
  });
  const fb=document.getElementById('fb'+i);
  if(j===q.ans){
    score++;
    fb.className='fb show ok';
    fb.textContent='✓ 정답';
  } else {
    fb.className='fb show no';
    fb.textContent='✗ 정답: '+String.fromCharCode(65+q.ans);
  }
  answered++;
  updateProgress();
  if(answered===QUIZ.length)showResult();
}

function updateProgress(){
  document.getElementById('pgText').textContent=answered+' / '+QUIZ.length;
  document.getElementById('scoreText').textContent='정답 '+score;
  document.getElementById('bScore').textContent=score+' / '+QUIZ.length;
  document.getElementById('pgFill').style.width=(answered/QUIZ.length*100)+'%';
}

function scrollNext(){
  for(let i=0;i<QUIZ.length;i++){
    const b=document.getElementById('q'+i);
    if(!b.dataset.done){
      b.scrollIntoView({behavior:'smooth',block:'start'});
      return;
    }
  }
}

function showResult(){
  // localStorage에 결과 저장 (잠금)
  try {
    localStorage.setItem('sys_check_v1', JSON.stringify({
      score: score,
      total: QUIZ.length,
      done: true,
      ts: Date.now()
    }));
  } catch(e) {}
  
  const r=document.getElementById('result');
  r.classList.add('show');
  document.getElementById('finalScore').textContent=score+' / '+QUIZ.length;
  const pct=score/QUIZ.length*100;
  let msg='';
  if(pct>=90)msg='완벽! 정답 근거를 정확히 짚었습니다.';
  else if(pct>=70)msg='괜찮음. 틀린 문항은 본문 단서를 다시 확인하세요.';
  else if(pct>=50)msg='보강 필요. 정답을 우연히 맞췄을 가능성 있음.';
  else msg='재학습 필요. 본문 근거 추적 훈련부터 다시.';
  document.getElementById('finalMsg').textContent=msg;
  r.scrollIntoView({behavior:'smooth'});
}

// 잠금 화면 표시 함수
function showLocked(savedData){
  document.getElementById('quiz').style.display='none';
  document.getElementById('bottom').style.display='none';
  const r=document.getElementById('result');
  r.classList.add('show');
  document.getElementById('finalScore').textContent=savedData.score+' / '+savedData.total;
  const pct=savedData.score/savedData.total*100;
  let msg='';
  if(pct>=90)msg='완벽! 정답 근거를 정확히 짚었습니다.';
  else if(pct>=70)msg='괜찮음. 틀린 문항은 본문 단서를 다시 확인하세요.';
  else if(pct>=50)msg='보강 필요. 정답을 우연히 맞췄을 가능성 있음.';
  else msg='재학습 필요. 본문 근거 추적 훈련부터 다시.';
  document.getElementById('finalMsg').textContent=msg + ' (이미 완료된 퀴즈)';
  // 다시 풀기 버튼 숨김
  const rb=document.getElementById('resetBtn');
  if(rb) rb.style.display='none';
}

function resetAll(){
  answered=0;score=0;
  document.getElementById('result').classList.remove('show');
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
