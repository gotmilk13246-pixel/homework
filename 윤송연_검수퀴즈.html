<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>윤송연 검수 퀴즈</title>
<style>
:root{color-scheme:light}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:#f5f5f7;color:#1a1a1a;line-height:1.5}
.gate{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:24px}
.gate h1{margin:0 0 16px;font-size:20px}
.gate input{font-size:18px;padding:12px 16px;border:2px solid #ddd;border-radius:10px;width:100%;max-width:280px;text-align:center}
.gate button{margin-top:12px;padding:12px 28px;font-size:16px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-weight:600}
.gate .err{color:#d33;font-size:13px;margin-top:8px;min-height:18px}
.hide{display:none!important}
.wrap{max-width:720px;margin:0 auto;padding:16px 14px 80px}
.head{background:#1a1a1a;color:#fff;padding:18px 16px;border-radius:14px;margin-bottom:14px}
.head h1{margin:0 0 4px;font-size:18px;font-weight:700}
.head p{margin:0;font-size:13px;opacity:.85}
.progress{position:sticky;top:0;background:rgba(245,245,247,.95);backdrop-filter:blur(8px);padding:10px 0;margin:-16px -14px 12px;border-bottom:1px solid #e5e5ea;z-index:10}
.progress-inner{max-width:720px;margin:0 auto;padding:0 14px;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#666}
.progress-bar{height:4px;background:#e5e5ea;border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;background:#1a1a1a;width:0;transition:width .25s}
.q{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.qnum{font-size:12px;font-weight:700;color:#888;letter-spacing:.5px;margin-bottom:6px}
.qtype{display:inline-block;background:#eef;color:#446;font-size:11px;padding:2px 8px;border-radius:6px;margin-left:6px;font-weight:600}
.qprompt{font-size:15px;font-weight:600;margin-bottom:6px;line-height:1.45}
.qsub{font-size:13px;color:#555;margin-bottom:14px;line-height:1.5;background:#f9f9fb;padding:10px 12px;border-radius:8px;border-left:3px solid #ccc}
.opts{display:flex;flex-direction:column;gap:8px}
.opt{padding:12px 14px;background:#f5f5f7;border:2px solid transparent;border-radius:10px;font-size:14px;line-height:1.45;cursor:pointer;transition:all .15s;text-align:left;color:#1a1a1a}
.opt:active{transform:scale(.98)}
.opt.sel{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.opt.correct{background:#d4f4dd;border-color:#2d8b3e;color:#1a3a22}
.opt.wrong{background:#fde0e0;border-color:#c33;color:#5a1818}
.opt.disabled{cursor:default}
.fb{margin-top:10px;padding:10px 12px;border-radius:8px;font-size:13px;line-height:1.5;display:none}
.fb.show{display:block}
.fb.ok{background:#e8f7ec;color:#1a3a22}
.fb.no{background:#fdecec;color:#5a1818}
.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e5e5ea;padding:12px 14px env(safe-area-inset-bottom);display:flex;gap:8px;justify-content:space-between;align-items:center}
.bottom .score{font-size:14px;font-weight:600}
.bottom button{padding:10px 18px;font-size:14px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-weight:600}
.bottom button:disabled{opacity:.4}
.result{background:#1a1a1a;color:#fff;padding:24px;border-radius:14px;text-align:center;margin-top:14px;display:none}
.result.show{display:block}
.result h2{margin:0 0 8px;font-size:24px}
.result p{margin:4px 0;font-size:14px;opacity:.85}
.result .big{font-size:42px;font-weight:800;margin:8px 0}
.reset{margin-top:14px;padding:10px 20px;background:transparent;color:#fff;border:1px solid #fff;border-radius:8px;font-size:13px}
</style>
</head>
<body>

<div class="wrap" id="main">
  <div class="head">
    <h1>윤송연 검수 퀴즈</h1>
    <p>각 문제의 정답 근거를 정확히 짚었는지 확인 · 20문항</p>
  </div>

  <div class="progress">
    <div class="progress-inner">
      <span id="pgText">0 / 20</span>
      <span id="scoreText">정답 0</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="pgFill"></div></div>
  </div>

  <div id="quiz"></div>

  <div class="result" id="result">
    <h2>완료!</h2>
    <div class="big" id="finalScore">0 / 20</div>
    <p id="finalMsg"></p>
    <button type="button" class="reset" id="resetBtn">다시 풀기</button>
  </div>
</div>

<div class="bottom" id="bottom">
  <div class="score" id="bScore">0 / 20</div>
  <button type="button" onclick="scrollNext()" id="nextBtn">다음 문항 ↓</button>
</div>

<script>


const QUIZ = [
  {n:1, type:'빈칸', prompt:'1번 빈칸 — 정답 ②(information already filtered through the theories we bring to the world)의 직접적 근거 문장은?',
   opts:[
    'A geologist trained in plate tectonics and one trained in an earlier theory of fixed continents do not merely interpret the same rock formations differently.',
    'Even the most careful experimenter cannot strip away these prior commitments and gain access to "raw" facts.',
    'The expectations built into a paradigm direct attention to certain features and render others invisible.',
    'What a researcher chooses to observe ... are all shaped by the conceptual framework she has already accepted.'
   ], ans:3},

  {n:2, type:'빈칸', prompt:'2번 빈칸 — 정답 ②(arranging the context in which alternatives are perceived and compared)와 가장 직접 대응되는 본문 표현은?',
   opts:[
    'rational agents, weighing costs and benefits to maximize utility',
    'reference points anchor their judgments / a jacket priced at 200,000 won feels expensive on its own but cheap beside a 500,000 won alternative',
    'systematic, predictable, and exploitable',
    'irrational errors that cancel out across a population'
   ], ans:1},

  {n:3, type:'빈칸', prompt:'3번 빈칸 — 정답 ②(a living process reshaped each time it is brought to mind)의 직접 재진술 문장은?',
   opts:[
    'Each act of remembering is also an act of reconstruction.',
    'Memory functions like a video recording — capturing events as they occurred.',
    'Subtle suggestions from a questioner ... can be incorporated into the stored trace.',
    'The remembered past, in other words, is continually being rewritten by the remembering present.'
   ], ans:3},

  {n:4, type:'빈칸', prompt:'4번 빈칸 "the visible surface of struggle that has been ___" — 빈칸 직전의 핵심 대조 표현은?',
   opts:[
    'the absence of struggle',
    'innate talent versus practice',
    'thousands of hours of practice broken down and rebuilt',
    'small adjustments to balance, timing, and posture'
   ], ans:0},

  {n:5, type:'빈칸', prompt:'5번 빈칸 — 정답 ③(the visible form of bonds that sustained the community itself)의 핵심 비유 표현은?',
   opts:[
    'a technically superior design imposed from outside',
    'rules may be obeyed while the social fabric quietly unravels',
    'institutions are not merely sets of rules to be redrawn at will',
    'reformers so often fail even when their proposals are evidently sound'
   ], ans:1},

  {n:6, type:'함축', prompt:'6번 "the museum has no walls" — 이 비유가 본문에서 직접 재진술된 표현은?',
   opts:[
    'the painting still hangs where it always hung',
    'curators have come to accept, sometimes reluctantly',
    'its audience is no longer defined by who can physically reach it',
    'a teenager in a small town can now zoom into the brushstrokes of a Vermeer'
   ], ans:2},

  {n:7, type:'함축', prompt:'7번 "the map began to redraw the territory" — 이 비유의 결정적 재진술 문장은?',
   opts:[
    'Standardized testing was originally introduced as a tool to measure something that already existed.',
    'Schools began organizing their curricula around what the tests asked.',
    'The instrument no longer simply tracked what was happening in classrooms; it dictated what was worth doing there.',
    'Parents began judging schools by their score reports.'
   ], ans:2},

  {n:8, type:'함축', prompt:'8번 "silence in the data" — 정답 ③의 근거가 되는 본문 핵심 문장은?',
   opts:[
    'Historians often celebrate what these documents reveal: trade flows, military movements.',
    'Servants, enslaved people, women in poor households ... appear, if at all, only as numbers in a column.',
    'To overlook this silence in the data is to mistake one slice of a society for the whole of it.',
    'Their own voices ... are rarely written down by themselves and almost never preserved by the institutions.'
   ], ans:3},

  {n:9, type:'주장', prompt:'9번 — 필자의 주장이 가장 명확하게 드러난 문장은?',
   opts:[
    'Many parents, hoping to protect their children from disappointment, intervene the moment a struggle appears.',
    'A child who never sits with the discomfort of not yet knowing how ... never gets the chance to discover that such moments can be survived.',
    'Children need to encounter manageable obstacles in the presence of caring adults who refuse to remove them.',
    'Stepping back at the right moment is one of the most active, attentive things a parent can do.'
   ], ans:2},

  {n:10, type:'주장', prompt:'10번 — 필자의 주장(④ 측정 지표가 실제 업무를 대체하지 않도록)을 결정짓는 마지막 문장은?',
   opts:[
    'Workplaces increasingly measure productivity through software dashboards.',
    'What gets measured also gets distorted.',
    'The dashboard fills with green indicators while the actual quality ... quietly erodes.',
    'Leaders should ask whether the number they are about to display will measure work, or merely replace it.'
   ], ans:3},

  {n:11, type:'주장', prompt:'11번 — 필자의 주장(④ 상대의 입장을 정확히 이해하려는 노력)의 결정타 문장은?',
   opts:[
    'There is a strong temptation to label the other side as ignorant or malicious.',
    'People who feel their views have been caricatured do not abandon those views.',
    'A genuine attempt to state another\'s position so accurately that the other would say, "Yes, that is what I believe."',
    'Before insisting that one\'s own argument be heard, one must first show that one has actually heard the argument on the other side.'
   ], ans:3},

  {n:12, type:'순서', prompt:'12번 순서 (B)-(C)-(A) — (A)가 마지막에 오는 결정적 단서는?',
   opts:[
    '(A)의 "Once this principle was understood"가 (B)의 화학 원리를 받음',
    '(A)의 "kimchi, salted fish, hard cheese"가 가장 구체적 사례',
    '(A)의 "any food a community happened to have in surplus"가 새 화제 도입',
    '(A)의 "trial and error"가 (C)의 결론을 뒷받침'
   ], ans:0},

  {n:13, type:'순서', prompt:'13번 순서 (A)-(C)-(B) — (B)가 마지막에 오는 결정적 단서는?',
   opts:[
    '(B)는 "When ocean temperatures rise"로 새 조건을 도입하며 균형이 깨지는 결말',
    '(B)는 산호의 색깔에 대한 첫 언급',
    '(B)의 "delicate exchange"가 (A)에서 처음 정의됨',
    '(B)는 산호와 조류 양쪽 모두를 처음 소개함'
   ], ans:0},

  {n:14, type:'순서', prompt:'14번 순서 (A)-(C)-(B) vs (A)-(B)-(C) 함정 — 정답 ①의 결정 근거는?',
   opts:[
    '(A)→(B): induced demand 명명 후 메커니즘 설명, (B)→(C): 비용 하락의 결과로 더 많은 차량',
    '(C)에 "Within a few years"가 시간순 마지막 신호',
    '(B)의 "Lower the cost"가 (A)의 equilibrium 개념을 직접 받음',
    '위 모두 정답이며, 특히 (B)→(C)의 인과 흐름이 자연스러워 (A)-(B)-(C)가 정답'
   ], ans:2},

  {n:15, type:'무관', prompt:'15번 — 무관 문장 ④(꿀 생산 과정)가 무관인 이유의 핵심은?',
   opts:[
    '꿀벌의 신체 구조와 무관해서',
    '전체 글의 주제(상징적/추상적 의사소통)와 인과 흐름이 끊김',
    '문장의 길이가 다른 문장들과 다름',
    '연구자들의 실험 내용과 모순됨'
   ], ans:1},

  {n:16, type:'무관', prompt:'16번 — 무관 문장 ④(제약 회사 광고 투자)가 무관인 이유는?',
   opts:[
    '플라시보 효과의 생리학적 실재성/임상 함의 흐름과 끊김',
    '제약 회사가 본문에 언급되지 않아서',
    '광고와 의학은 관련이 없어서',
    '문장이 너무 짧아서'
   ], ans:0},

  {n:17, type:'삽입', prompt:'17번 — 주어진 문장 "Yet ... can come to seem indispensable"이 ③에 들어가는 결정적 단서는?',
   opts:[
    '② 이후 포크·커피하우스·번지수 사례가 나오므로 ② 자리가 맞음',
    '주어진 문장의 "indispensable"이 ③ 이후의 "naturalization"이라는 명명을 자연스럽게 연결시킴',
    '④ 이후 "embedded in routines"가 주어진 문장을 직접 받음',
    '⑤의 "earlier moment of resistance"가 주어진 문장의 시작 신호'
   ], ans:1},

  {n:18, type:'삽입', prompt:'18번 — 주어진 문장 "The result is a paradox"가 ③에 들어가는 단서는?',
   opts:[
    '② 이후 "Such tools genuinely reduce uncertainty"가 paradox를 받음',
    '③ 이후 "But the same precision can mislead"가 paradox의 구체화',
    '④의 "single expected rainfall"이 paradox의 첫 사례',
    '⑤의 "structured guess"가 paradox와 직접 연결'
   ], ans:1},

  {n:19, type:'주제', prompt:'19번 주제 — 정답 ②(loss of unique perceptual frameworks)의 결정 단서 문장은?',
   opts:[
    'A coastal community ... has encoded sailing knowledge directly into vocabulary.',
    'Dictionaries can preserve word lists, but the network of distinctions ... fades with the last fluent generation.',
    'What disappears is therefore not merely a different way of saying the same things, but a different way of seeing what there is to say.',
    'A forest people whose verbs change depending on whether an action is observed, inferred, or merely reported.'
   ], ans:2},

  {n:20, type:'제목', prompt:'20번 제목 — 정답 ③(When Fluency Hides Error)의 결정 단서 문장은?',
   opts:[
    'Beginners attend carefully to each step.',
    'This automation is what makes expert performance possible — but it also makes errors harder to detect, since mistakes feel as natural as correct moves.',
    'Studies of seasoned professionals across fields, from radiology to chess.',
    'Without deliberate efforts to slow down, court disconfirming evidence, and revisit fundamentals.'
   ], ans:1}
];

// resetBtn 리스너
window.addEventListener('DOMContentLoaded',function(){
  // 잠금 체크
  try {
    const saved = localStorage.getItem('ysy_check_v1');
    if(saved){
      const data = JSON.parse(saved);
      if(data && data.done){
        showLocked(data);
        return;
      }
    }
  } catch(e) {}
  
  const _resetBtn=document.getElementById('resetBtn');
  if(_resetBtn){
    ['click','touchend'].forEach(ev=>_resetBtn.addEventListener(ev,function(e){
      if(ev==='touchend')e.preventDefault();
      resetAll();
    },{passive:false}));
  }
  render();
});

let answered=0, score=0, current=0;

function render(){
  const root=document.getElementById('quiz');
  root.innerHTML='';
  QUIZ.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='q';
    div.id='q'+i;
    div.innerHTML=`
      <div class="qnum">Q${q.n} <span class="qtype">${q.type}</span></div>
      <div class="qprompt">${q.prompt}</div>
      <div class="opts">
        ${q.opts.map((o,j)=>`<button type="button" class="opt" data-i="${i}" data-j="${j}">${String.fromCharCode(65+j)}. ${o}</button>`).join('')}
      </div>
      <div class="fb" id="fb${i}"></div>
    `;
    root.appendChild(div);
  });
  root.querySelectorAll('.opt').forEach(b=>{
    ['click','touchend'].forEach(ev=>b.addEventListener(ev,function(e){
      if(ev==='touchend')e.preventDefault();
      pick.call(b,{target:b});
    },{passive:false}));
  });
  updateProgress();
}

function pick(e){
  const tgt = e.target;
  const i=+tgt.dataset.i, j=+tgt.dataset.j;
  const q=QUIZ[i];
  const block=document.getElementById('q'+i);
  if(block.dataset.done)return;
  block.dataset.done='1';
  const opts=block.querySelectorAll('.opt');
  opts.forEach((o,k)=>{
    o.classList.add('disabled');
    if(k===q.ans)o.classList.add('correct');
    if(k===j&&j!==q.ans)o.classList.add('wrong');
  });
  const fb=document.getElementById('fb'+i);
  if(j===q.ans){
    score++;
    fb.className='fb show ok';
    fb.textContent='✓ 정답';
  } else {
    fb.className='fb show no';
    fb.textContent='✗ 정답: '+String.fromCharCode(65+q.ans);
  }
  answered++;
  updateProgress();
  if(answered===QUIZ.length)showResult();
}

function updateProgress(){
  document.getElementById('pgText').textContent=answered+' / '+QUIZ.length;
  document.getElementById('scoreText').textContent='정답 '+score;
  document.getElementById('bScore').textContent=score+' / '+QUIZ.length;
  document.getElementById('pgFill').style.width=(answered/QUIZ.length*100)+'%';
}

function scrollNext(){
  for(let i=0;i<QUIZ.length;i++){
    const b=document.getElementById('q'+i);
    if(!b.dataset.done){
      b.scrollIntoView({behavior:'smooth',block:'start'});
      return;
    }
  }
}

function showResult(){
  // localStorage에 결과 저장 (잠금)
  try {
    localStorage.setItem('ysy_check_v1', JSON.stringify({
      score: score,
      total: QUIZ.length,
      done: true,
      ts: Date.now()
    }));
  } catch(e) {}
  
  const r=document.getElementById('result');
  r.classList.add('show');
  document.getElementById('finalScore').textContent=score+' / '+QUIZ.length;
  const pct=score/QUIZ.length*100;
  let msg='';
  if(pct>=90)msg='완벽! 정답 근거를 정확히 짚었습니다.';
  else if(pct>=70)msg='괜찮음. 틀린 문항은 본문 단서를 다시 확인하세요.';
  else if(pct>=50)msg='보강 필요. 정답을 우연히 맞췄을 가능성 있음.';
  else msg='재학습 필요. 본문 근거 추적 훈련부터 다시.';
  document.getElementById('finalMsg').textContent=msg;
  r.scrollIntoView({behavior:'smooth'});
}

// 잠금 화면 표시 함수
function showLocked(savedData){
  document.getElementById('quiz').style.display='none';
  document.getElementById('bottom').style.display='none';
  const r=document.getElementById('result');
  r.classList.add('show');
  document.getElementById('finalScore').textContent=savedData.score+' / '+savedData.total;
  const pct=savedData.score/savedData.total*100;
  let msg='';
  if(pct>=90)msg='완벽! 정답 근거를 정확히 짚었습니다.';
  else if(pct>=70)msg='괜찮음. 틀린 문항은 본문 단서를 다시 확인하세요.';
  else if(pct>=50)msg='보강 필요. 정답을 우연히 맞췄을 가능성 있음.';
  else msg='재학습 필요. 본문 근거 추적 훈련부터 다시.';
  document.getElementById('finalMsg').textContent=msg + ' (이미 완료된 퀴즈)';
  // 다시 풀기 버튼 숨김
  const rb=document.getElementById('resetBtn');
  if(rb) rb.style.display='none';
}

function resetAll(){
  answered=0;score=0;current=0;
  document.getElementById('result').classList.remove('show');
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
