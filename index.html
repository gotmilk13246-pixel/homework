<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYClogic 드릴 검수 퀴즈</title>
<style>
:root{color-scheme:light}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:#f5f5f7;color:#1a1a1a;line-height:1.5;min-height:100vh}
.wrap{max-width:560px;margin:0 auto;padding:24px 16px}
.head{background:#1a1a1a;color:#fff;padding:24px 20px;border-radius:14px;margin-bottom:20px;text-align:center}
.head h1{margin:0 0 6px;font-size:20px;font-weight:700}
.head p{margin:0;font-size:13px;opacity:.85}
.list{display:flex;flex-direction:column;gap:10px}
a.card{display:block;background:#fff;padding:18px 20px;border-radius:12px;text-decoration:none;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.04);font-size:16px;font-weight:600;transition:transform .1s}
a.card:active{transform:scale(.98)}
a.card .arrow{float:right;color:#888;font-weight:400}
a.card .sub{display:block;font-size:12px;color:#888;font-weight:400;margin-top:4px}
.foot{text-align:center;font-size:12px;color:#999;margin-top:20px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <h1>KYClogic 드릴 검수 퀴즈</h1>
    <p>본인 이름을 눌러 시작하세요</p>
  </div>
  <div class="list">
    <a class="card" href="ysy.html">윤송연 <span class="arrow">→</span><span class="sub">비유·근거 추적 · 20문항</span></a>
    <a class="card" href="kyj.html">권유진 <span class="arrow">→</span><span class="sub">단어함정·인과사슬 · 20문항</span></a>
    <a class="card" href="oys.html">오연서 <span class="arrow">→</span><span class="sub">지시어·비유·대조 · 20문항</span></a>
    <a class="card" href="sys.html">소윤성 <span class="arrow">→</span><span class="sub">역접·반전 신호 · 20문항</span></a>
    <a class="card" href="jis.html">조인성 <span class="arrow">→</span><span class="sub">기초 통념-주장 구조 · 20문항</span></a>
  </div>
  <div class="foot">⚠️ 한 번 풀면 잠깁니다. 신중히 풀어주세요.</div>
</div>
</body>
</html>
